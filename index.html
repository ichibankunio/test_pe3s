        <script>
        // iOS Safari: block pinch and double-tap zoom.
        (function disableIOSZoom() {
            const isInEmojiMart = (event) => {
                const root = window.__emojiMartRoot;
                if (!root || !event) {
                    return false;
                }
                const path = typeof event.composedPath === "function" ? event.composedPath() : null;
                if (path && path.length > 0) {
                    for (const node of path) {
                        if (node === root) {
                            return true;
                        }
                        if (node instanceof Element && root.contains(node)) {
                            return true;
                        }
                    }
                    return false;
                }
                const target = event.target;
                return target instanceof Element && root.contains(target);
            };
            const prevent = (event) => event.preventDefault();
            const preventOutsideEmojiMart = (event) => {
                if (isInEmojiMart(event)) {
                    return;
                }
                event.preventDefault();
            };
            document.addEventListener("gesturestart", prevent, { passive: false });
            document.addEventListener("gesturechange", prevent, { passive: false });
            document.addEventListener("gestureend", prevent, { passive: false });
            document.addEventListener("touchstart", (event) => {
                if (event.touches && event.touches.length > 1) {
                    event.preventDefault();
                }
            }, { passive: false });
            let lastTouchEnd = 0;
            document.addEventListener("touchend", (event) => {
                const now = Date.now();
                if (now - lastTouchEnd < 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, { passive: false });
            // Keep page fixed even when browser tries to pan/scroll while interacting with controls.
            document.addEventListener("touchmove", preventOutsideEmojiMart, { passive: false });
            document.addEventListener("wheel", preventOutsideEmojiMart, { passive: false });
            document.addEventListener("scroll", () => window.scrollTo(0, 0), { passive: true });
        })();
        </script>

    <script type="module">
    import { Picker } from "https://cdn.jsdelivr.net/npm/emoji-mart@5.6.0/+esm";
    
    const TWEMOJI_DATA_URL = "https://cdn.jsdelivr.net/npm/@emoji-mart/data@1.2.1/sets/14/twitter.json";
    const EMOJIBASE_JA_DATA_URL = "https://cdn.jsdelivr.net/npm/emojibase-data@16.0.0/ja/data.json";

    const EMOJI_MART_BASE_WIDTH = 352;
    const EMOJI_MART_BASE_HEIGHT = 435;
    let emojiMartRoot = null;
    let emojiMartHost = null;
    let emojiMartDataPromise = null;
    let emojiBaseJaDataPromise = null;

    function loadEmojiMartData() {
        if (!emojiMartDataPromise) {
            emojiMartDataPromise = fetch(TWEMOJI_DATA_URL).then((res) => {
                if (!res.ok) {
                    throw new Error("failed to load twemoji data: " + res.status);
                }
                return res.json();
            });
        }
        return emojiMartDataPromise;
    }

    function loadEmojiBaseJaData() {
        if (!emojiBaseJaDataPromise) {
            emojiBaseJaDataPromise = fetch(EMOJIBASE_JA_DATA_URL).then((res) => {
                if (!res.ok) {
                    throw new Error("failed to load emojibase ja data: " + res.status);
                }
                return res.json();
            }).catch((err) => {
                console.warn(err);
                return null;
            });
        }
        return emojiBaseJaDataPromise;
    }

    function normalizeEmojiKey(emoji) {
        if (typeof emoji !== "string") {
            return "";
        }
        return emoji.replace(/\uFE0F/g, "").trim();
    }

    function katakanaToHiragana(text) {
        if (typeof text !== "string" || text === "") {
            return "";
        }
        return text.replace(/[\u30A1-\u30F6]/g, (ch) =>
            String.fromCharCode(ch.charCodeAt(0) - 0x60)
        );
    }

    function hiraganaToKatakana(text) {
        if (typeof text !== "string" || text === "") {
            return "";
        }
        return text.replace(/[\u3041-\u3096]/g, (ch) =>
            String.fromCharCode(ch.charCodeAt(0) + 0x60)
        );
    }

    function expandKanaVariants(term) {
        if (typeof term !== "string") {
            return [];
        }
        const base = term.trim();
        if (base === "") {
            return [];
        }
        const set = new Set([base]);
        set.add(katakanaToHiragana(base));
        set.add(hiraganaToKatakana(base));
        return Array.from(set).filter((v) => v !== "");
    }

    function buildJaKeywordMap(entries) {
        const map = new Map();
        if (!Array.isArray(entries)) {
            return map;
        }
        entries.forEach((entry) => {
            if (!entry || typeof entry !== "object") {
                return;
            }
            const key = normalizeEmojiKey(entry.emoji);
            if (!key) {
                return;
            }
            const terms = [];
            if (typeof entry.annotation === "string" && entry.annotation.trim() !== "") {
                terms.push(entry.annotation.trim());
            }
            if (Array.isArray(entry.tags)) {
                entry.tags.forEach((tag) => {
                    if (typeof tag === "string" && tag.trim() !== "") {
                        terms.push(tag.trim());
                    }
                });
            }
            if (terms.length === 0) {
                return;
            }
            const termSet = map.get(key) || new Set();
            terms.forEach((term) => {
                expandKanaVariants(term).forEach((variant) => termSet.add(variant));
            });
            map.set(key, termSet);
        });
        return map;
    }

    function enrichEmojiMartDataWithJapaneseKeywords(data, jaEntries) {
        if (!data || typeof data !== "object") {
            return data;
        }
        const emojiMap = data.emojis;
        if (!emojiMap || typeof emojiMap !== "object") {
            return data;
        }
        const jaKeywordMap = buildJaKeywordMap(jaEntries);
        if (jaKeywordMap.size === 0) {
            return data;
        }
        Object.values(emojiMap).forEach((entry) => {
            if (!entry || typeof entry !== "object") {
                return;
            }
            const nativeEmoji = normalizeEmojiKey(
                entry.emoji ||
                (Array.isArray(entry.skins) && entry.skins.length > 0 && entry.skins[0] && entry.skins[0].native)
            );
            if (!nativeEmoji) {
                return;
            }
            const jaTerms = jaKeywordMap.get(nativeEmoji);
            if (!jaTerms || jaTerms.size === 0) {
                return;
            }
            const existing = Array.isArray(entry.keywords) ? entry.keywords : [];
            const merged = new Set(existing);
            jaTerms.forEach((term) => merged.add(term));
            entry.keywords = Array.from(merged);
        });
        return data;
    }

    function hardenPickerInputs(picker) {
        if (!picker || !picker.shadowRoot) {
            return;
        }
        const shadow = picker.shadowRoot;
        const ensureInputStyle = () => {
            const fields = shadow.querySelectorAll("input, textarea, select");
            fields.forEach((field) => {
                field.style.setProperty("font-size", "16px", "important");
            });
        };
        if (!shadow.querySelector("style[data-no-ios-zoom]")) {
            const style = document.createElement("style");
            style.setAttribute("data-no-ios-zoom", "1");
            style.textContent = "input,textarea,select{font-size:16px!important;}";
            shadow.appendChild(style);
        }
        ensureInputStyle();
        const observer = new MutationObserver(ensureInputStyle);
        observer.observe(shadow, { childList: true, subtree: true });
        shadow.addEventListener("focusin", ensureInputStyle, true);
    }

    async function ensureEmojiMart() {
        if (emojiMartRoot) {
            return;
        }
        const [data, jaEntries] = await Promise.all([loadEmojiMartData(), loadEmojiBaseJaData()]);
        enrichEmojiMartDataWithJapaneseKeywords(data, jaEntries);
        emojiMartRoot = document.createElement("div");
        emojiMartRoot.style.position = "fixed";
        emojiMartRoot.style.display = "none";
        emojiMartRoot.style.zIndex = "10002";
        emojiMartRoot.style.overflow = "hidden";
        emojiMartRoot.style.borderRadius = "14px";
        emojiMartRoot.style.boxShadow = "0 12px 32px rgba(0, 0, 0, 0.28)";
        emojiMartRoot.style.background = "#fff";
        emojiMartRoot.style.touchAction = "pan-y";
        window.__emojiMartRoot = emojiMartRoot;

        emojiMartHost = document.createElement("div");
        emojiMartHost.style.width = EMOJI_MART_BASE_WIDTH + "px";
        emojiMartHost.style.height = EMOJI_MART_BASE_HEIGHT + "px";
        emojiMartHost.style.transformOrigin = "top left";
        emojiMartRoot.appendChild(emojiMartHost);

        const picker = new Picker({
            data,
            set: "twitter",
            locale: "ja",
            theme: "light",
            previewPosition: "none",
            skinTonePosition: "none",
            perLine: 7,
            emojiSize: 28,
            emojiButtonSize: 48,
            maxFrequentRows: 2,
            onEmojiSelect: (emoji) => {
                if (emoji && emoji.native) {
                    window.__emojiMartSelected = emoji.native;
                }
            }
        });
        picker.style.setProperty("--font-size", "16px");
        hardenPickerInputs(picker);
        emojiMartHost.appendChild(picker);
        (document.body || document.documentElement).appendChild(emojiMartRoot);
    }

    window.__emojiMartSelected = "";
    window.syncEmojiMartPicker = async (opts = {}) => {
        await ensureEmojiMart();
        const open = !!opts.open;
        if (!open) {
            emojiMartRoot.style.display = "none";
            return;
        }

        const width = Math.max(260, Number(opts.width || 0));
        const height = Math.max(260, Number(opts.height || 0));
        const left = Math.max(0, Number(opts.left || 0));
        const top = Math.max(0, Number(opts.top || 0));
        const scale = Math.min(width / EMOJI_MART_BASE_WIDTH, height / EMOJI_MART_BASE_HEIGHT);

        emojiMartRoot.style.display = "block";
        emojiMartRoot.style.left = left + "px";
        emojiMartRoot.style.top = top + "px";
        emojiMartRoot.style.width = width + "px";
        emojiMartRoot.style.height = height + "px";
        emojiMartHost.style.transform = "scale(" + Math.max(0.55, scale) + ")";
    };
    </script>
    <script>

    const onboardingOverlay = (() => {

            {
                title: "操作方法",
                body: "画面をタップして絵文字を貼り付けましょう。拡大縮小・回転・削除もできます。右上の絵文字ボタンから絵文字の変更ができます。",
                image: "onboarding/02_edit.jpg",
                alt: "絵文字編集操作中のスクリーンショット"

                image: "onboarding/03_save.jpg",
                alt: "保存とシェア画面のスクリーンショット"
            },
            {
                title: "SNSでシェアしよう！",
                body: "画像はInstagramのストーリーズに投稿するのにピッタリのサイズです。シェアしてみてください！",
                image: "onboarding/04_share.jpg",
                alt: "SNS共有向け画像のスクリーンショット"
            },
            {

                body: "画像を選択ボタンから、デコレーションしたい画像を選択して始めましょう！",
                image: "onboarding/05_select.JPG",

            }
        ];
        let root = null;
        let panel = null;
        let viewport = null;
        let track = null;
        let dots = [];
        let activeIndex = 0;
        let mounted = false;
        let dragStartX = 0;
        let dragDeltaX = 0;
        let dragging = false;

        function updateTrack(animate) {
            if (!track || !viewport) {
                return;
            }
            const width = viewport.clientWidth || 1;
            const x = -activeIndex * width + dragDeltaX;
            track.style.transition = animate ? "transform 200ms ease" : "none";
            track.style.transform = "translateX(" + x + "px)";
        }

        function setActive(index, animate = true) {
            activeIndex = Math.max(0, Math.min(slides.length - 1, index));
            dots.forEach((dot, i) => {
                dot.style.background = i === activeIndex ? "#ffd84a" : "#fff2b3";
                dot.style.transform = i === activeIndex ? "scale(1.1)" : "scale(1)";
            });
            updateTrack(animate);
        }

        function eventX(event) {
            if (event.touches && event.touches.length > 0) {
                return event.touches[0].clientX;
            }
            if (event.changedTouches && event.changedTouches.length > 0) {
                return event.changedTouches[0].clientX;
            }
            return 0;
        }

        function ensure() {
            if (root) {
                return;
            }
            root = document.createElement("div");
            root.style.position = "fixed";
            root.style.inset = "0";
            root.style.display = "none";
            root.style.zIndex = "10001";
            root.style.background = "linear-gradient(180deg, #fff7c8 0%, #fffef6 42%, #ffffff 100%)";
            root.style.pointerEvents = "none";

            panel = document.createElement("div");
            panel.style.position = "absolute";
            panel.style.background = "transparent";
            panel.style.display = "flex";
            panel.style.flexDirection = "column";
            panel.style.pointerEvents = "auto";
            panel.style.fontFamily = '"Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN W4", "Yu Gothic", "YuGothic", "Meiryo", sans-serif';

            viewport = document.createElement("div");
            viewport.style.overflow = "hidden";
            viewport.style.touchAction = "pan-x";
            viewport.style.padding = "max(16px, env(safe-area-inset-top, 0px)) 0 0";
            viewport.style.boxSizing = "border-box";
            viewport.style.whiteSpace = "normal";
            viewport.style.flex = "1";
            viewport.style.minHeight = "280px";
            viewport.style.overscrollBehaviorX = "contain";
            viewport.style.overscrollBehaviorY = "contain";
            viewport.addEventListener("touchstart", (event) => {
                if (!event.touches || event.touches.length !== 1) {
                    return;
                }
                event.stopPropagation();
                dragging = true;
                dragStartX = eventX(event);
                dragDeltaX = 0;
                updateTrack(false);
            }, { passive: true });
            viewport.addEventListener("touchmove", (event) => {
                if (!dragging) {
                    return;
                }
                event.stopPropagation();
                dragDeltaX = eventX(event) - dragStartX;
                updateTrack(false);
            }, { passive: true });
            viewport.addEventListener("touchend", (event) => {
                if (!dragging) {
                    return;
                }
                event.stopPropagation();
                const delta = eventX(event) - dragStartX;
                dragging = false;
                dragDeltaX = 0;
                if (Math.abs(delta) > 40) {
                    const next = delta < 0 ? activeIndex + 1 : activeIndex - 1;
                    setActive(next, true);
                    return;
                }
                setActive(activeIndex, true);
            }, { passive: true });
            viewport.addEventListener("touchcancel", () => {
                dragging = false;
                dragDeltaX = 0;
                setActive(activeIndex, true);
            }, { passive: true });
            viewport.addEventListener("wheel", (event) => event.stopPropagation(), { passive: true });

            track = document.createElement("div");
            track.style.display = "flex";
            track.style.width = "100%";
            track.style.height = "100%";
            track.style.willChange = "transform";

            slides.forEach((slide) => {

                const imageFrame = document.createElement("div");

                const screenshot = document.createElement("img");

                screenshot.style.width = "96%";
                screenshot.style.height = "96%";
                screenshot.style.borderRadius = "10px";
                screenshot.style.objectFit = "contain";
                screenshot.style.objectPosition = "center top";
                screenshot.style.display = "block";

                const fallback = document.createElement("div");
                fallback.textContent = "スクリーンショット準備中";
                fallback.style.position = "absolute";
                fallback.style.inset = "0";
                fallback.style.display = "none";
                fallback.style.alignItems = "center";
                fallback.style.justifyContent = "center";

                fallback.style.fontSize = "13px";

                fallback.style.background = "linear-gradient(180deg, #f7f7f7 0%, #ffffff 100%)";
                screenshot.addEventListener("error", () => {

                imageFrame.appendChild(screenshot);
                imageFrame.appendChild(fallback);

                const textWrap = document.createElement("div");
                textWrap.style.background = "rgba(255, 255, 255, 0.9)";
                textWrap.style.borderRadius = "14px";
                textWrap.style.padding = "14px 14px 16px";
                textWrap.style.border = "1px solid rgba(0, 0, 0, 0.08)";
                textWrap.style.boxShadow = "0 8px 20px rgba(0, 0, 0, 0.05)";
                textWrap.style.minHeight = "130px";

                const title = document.createElement("h2");
                title.textContent = slide.title;
                title.style.margin = "0 0 10px";
                title.style.fontSize = "21px";
                title.style.lineHeight = "1.35";
                title.style.fontWeight = "700";
                title.style.color = "#1f1f1f";
                title.style.textDecoration = "underline";
                title.style.textDecorationColor = "#ffd84a";
                title.style.textDecorationThickness = "6px";
                title.style.textUnderlineOffset = "0.08em";

                const body = document.createElement("p");
                body.textContent = slide.body;
                body.style.margin = "0";
                body.style.fontSize = "15px";
                body.style.lineHeight = "1.75";
                body.style.color = "#4a4a4a";

                textWrap.appendChild(title);
                textWrap.appendChild(body);
                item.appendChild(imageFrame);
                item.appendChild(textWrap);
                track.appendChild(item);
            });
            viewport.appendChild(track);

            const footer = document.createElement("div");
            footer.style.display = "flex";
            footer.style.alignItems = "center";
            footer.style.justifyContent = "space-between";
            footer.style.padding = "12px 20px max(16px, env(safe-area-inset-bottom, 0px))";
            footer.style.background = "rgba(255, 255, 255, 0.94)";
            footer.style.backdropFilter = "blur(2px)";
            footer.style.borderTop = "1px solid rgba(0, 0, 0, 0.08)";

            const dotsRow = document.createElement("div");
            dotsRow.style.display = "flex";
            dotsRow.style.gap = "8px";
            slides.forEach((_, i) => {
                const dot = document.createElement("button");
                dot.type = "button";
                dot.setAttribute("aria-label", "slide " + (i + 1));
                dot.style.width = "8px";
                dot.style.height = "8px";
                dot.style.borderRadius = "999px";
                dot.style.border = "none";
                dot.style.padding = "0";
                dot.style.cursor = "pointer";
                dot.style.background = "#fff2b3";
                dot.style.transition = "transform 120ms ease, background-color 120ms ease";
                dot.addEventListener("click", () => {
                    setActive(i);
                });
                dots.push(dot);
                dotsRow.appendChild(dot);
            });

            const action = document.createElement("button");
            action.type = "button";
            action.textContent = "画像を選択";
            action.style.height = "36px";
            action.style.padding = "0 14px";
            action.style.borderRadius = "999px";
            action.style.border = "none";
            action.style.background = "#ffd84a";
            action.style.color = "#2f2f2f";
            action.style.fontSize = "13px";
            action.style.fontWeight = "700";
            action.style.cursor = "pointer";
            action.style.boxShadow = "0 6px 14px rgba(0, 0, 0, 0.24)";
            action.addEventListener("click", () => {
                const trigger = window.triggerSelectImageFromOnboarding;
                if (typeof trigger === "function") {
                    trigger();
                }
            });

            footer.appendChild(dotsRow);
            footer.appendChild(action);
            panel.appendChild(viewport);
            panel.appendChild(footer);
            root.appendChild(panel);
            setActive(0);
            window.addEventListener("resize", () => updateTrack(false));
        }

        function mount() {
            if (mounted) {
                return;
            }
            const parent = document.body || document.documentElement;
            if (!parent) {
                return;
            }
            parent.appendChild(root);
            mounted = true;
        }

        function hide() {
            if (!root) {
                return;
            }
            root.style.display = "none";
        }

        function show(opts = {}) {
            ensure();
            mount();
            root.style.display = "block";

            const left = Number(opts.left || 0);
            const top = Number(opts.top || 0);
            const width = Math.max(0, Number(opts.width || window.innerWidth));
            const height = Math.max(0, Number(opts.height || window.innerHeight));
            panel.style.left = left + "px";
            panel.style.top = top + "px";
            panel.style.width = width + "px";
            panel.style.height = height + "px";
        }

        function sync(opts = {}) {
            if (opts.show) {
                show(opts);
                return;
            }
            hide();
        }

        return { sync };
    })();
    window.syncOnboardingOverlay = (opts = {}) => onboardingOverlay.sync(opts);

    function waitForCanvasReady(timeoutMs = 10000) {
        return new Promise((resolve) => {
            const done = () => {
                if (observer) {
                    observer.disconnect();
                }
                clearTimeout(timeoutId);
                resolve();
            };
            const isReady = () => {
                const canvas = document.querySelector('canvas');
                return canvas && canvas.width > 0 && canvas.height > 0;
            };
            if (isReady()) {
                resolve();
                return;
            }
            const observer = new MutationObserver(() => {
                if (isReady()) {
                    done();
                }
            });
            observer.observe(document.documentElement, { childList: true, subtree: true });
            const timeoutId = setTimeout(done, timeoutMs);
        });
    }

    async function bootWasm() {
        const go = new Go();
        try {
            const result = await WebAssembly.instantiateStreaming(fetch("game.wasm"), go.importObject);
            go.run(result.instance);
            await waitForCanvasReady();
        } catch (error) {
            console.error("failed to start wasm:", error);
        }
    }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script>
        function createProgressBar(labelText) {
            let root = null;
            let bar = null;
            let timer = null;
            let progress = 0;
            let visible = false;

            function ensure() {
                if (root) {
                    return;
                }

                root = document.createElement('div');
                root.style.position = 'fixed';
                root.style.left = '24px';
                root.style.right = '24px';
                root.style.top = '50%';
                root.style.transform = 'translateY(-50%)';
                root.style.zIndex = '9999';
                root.style.display = 'none';
                root.style.pointerEvents = 'none';
                root.style.maxWidth = '360px';
                root.style.margin = '0 auto';

                const panel = document.createElement('div');
                panel.style.padding = '14px 16px 12px';
                panel.style.borderRadius = '14px';
                panel.style.background = 'rgba(255, 255, 255, 0.94)';
                panel.style.border = '1px solid rgba(0, 0, 0, 0.08)';
                panel.style.boxShadow = '0 8px 24px rgba(0, 0, 0, 0.18)';
                panel.style.backdropFilter = 'blur(2px)';

                const label = document.createElement('div');
                label.textContent = labelText;
                label.style.marginBottom = '8px';
                label.style.textAlign = 'center';
                label.style.color = '#222';
                label.style.fontSize = '14px';
                label.style.fontWeight = '700';
                label.style.fontFamily = '"Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN W4", "Yu Gothic", "YuGothic", "Meiryo", sans-serif';

                const track = document.createElement('div');
                track.style.width = '100%';
                track.style.height = '8px';
                track.style.borderRadius = '999px';
                track.style.overflow = 'hidden';
                track.style.background = 'rgba(0, 0, 0, 0.15)';

                bar = document.createElement('div');
                bar.style.height = '100%';
                bar.style.width = '0%';
                bar.style.background = '#f7dc63';
                bar.style.transition = 'width 140ms linear';

                panel.appendChild(label);
                track.appendChild(bar);
                panel.appendChild(track);
                root.appendChild(panel);
                document.body.appendChild(root);
            }

            function stop() {
                if (timer) {
                    clearInterval(timer);
                    timer = null;
                }
            }

            function show() {
                ensure();
                if (visible) {
                    return;
                }
                visible = true;
                stop();
                progress = 12;
                bar.style.width = progress + '%';
                root.style.display = 'block';

                timer = setInterval(() => {
                    progress = Math.min(92, progress + 4);
                    bar.style.width = progress + '%';
                }, 120);
            }

            function hide() {
                ensure();
                visible = false;
                stop();
                progress = 100;
                bar.style.width = progress + '%';
                setTimeout(() => {
                    if (!root) {
                        return;
                    }
                    root.style.display = 'none';
                    bar.style.width = '0%';
                }, 140);
            }

            function prepare() {
                ensure();
            }

            return { show, hide, prepare };
        }

        const saveProgressBar = createProgressBar('保存準備中...');
        const loadingProgressBar = createProgressBar('ロード中...');

        async function startApp() {
            saveProgressBar.prepare();
            loadingProgressBar.prepare();
            loadingProgressBar.show();
            try {
                await Promise.all([
                    bootWasm(),
                    new Promise((resolve) => setTimeout(resolve, 2000))
                ]);
            } finally {
                loadingProgressBar.hide();
                onboardingOverlay.sync({ show: true });
            }
        }

        window.addEventListener('load', () => {
            startApp();
        });

        function showSaveProgress() {
            saveProgressBar.show();
        }

        function hideSaveProgress() {
            saveProgressBar.hide();
        }

        async function saveImage(bytes) {
            console.log("js was called")
            showSaveProgress();

            const fileName = "3d-emoji-sticker_" + getDate() + ".jpg";
            const blob = new Blob([bytes], { type: 'image/jpeg' });
            const imageFile = new File([blob], fileName, { type: 'image/jpeg' });

            if (typeof navigator.share === 'function') {
                const shareData = {
                    files: [imageFile],
                    title: 'ぷくぷくシールえもじフォトメーカー',
                    text: '画像を保存または共有できます'
                };

                try {
                    const canShareFiles = typeof navigator.canShare !== 'function' || navigator.canShare({ files: [imageFile] });
                    if (canShareFiles) {
                        hideSaveProgress();
                        await navigator.share(shareData);
                        return;
                    }
                } catch (error) {
                    if (error && error.name === 'AbortError') {
                        return;
                    }
                    console.log('share failed:', error);
                }
            }

            const imageUrl = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = imageUrl;
            console.log(a.href);
            a.download = fileName;
            hideSaveProgress();
            a.click();
            URL.revokeObjectURL(imageUrl);
        }

        function getDate() {
            let now = new Date();
            let year = now.getFullYear();
            let month = now.getMonth() + 1;
            let date = now.getDate();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            month = month < 10 ? '0' + month : month;
            date = date < 10 ? '0' + date : date;
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            let yyyymmddhhmmss = '' + year + month + date + hours + minutes + seconds;
            return yyyymmddhhmmss;
        }

        function getRotation(src) {
            return new Promise((resolve) => {
                EXIF.getData(src, function(){
                    var exifData = EXIF.pretty(this);

                    let rotation = 0;

                    if (exifData) {
                        const orientation = Number(EXIF.getTag(this, "Orientation"));

                        console.log(orientation);
                        if (orientation === 3) {
                            rotation = 180;
                        } else if (orientation === 6) {
                            rotation = 90;
                        } else if (orientation === 8) {
                            rotation = 270;
                        }
                    } else {
                        console.log("doesn't have exif")
                    }

                    resolve(rotation);
                });
            });
        }

        async function loadImageFile(file) {
            if (window.createImageBitmap) {
                return await createImageBitmap(file);
            }

            return await new Promise((resolve, reject) => {
                const objectUrl = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => {
                    URL.revokeObjectURL(objectUrl);
                    resolve(img);
                };
                img.onerror = (e) => {
                    URL.revokeObjectURL(objectUrl);
                    reject(e);
                };
                img.src = objectUrl;
            });
        }

        async function resizeImageToFHDBytes(file) {
            const minShortSide = 1080;
            const minLongSide = 1920;
            const rotation = await getRotation(file);

            const sourceImage = await loadImageFile(file);
            const originalWidth = sourceImage.width;
            const originalHeight = sourceImage.height;
            const longSide = Math.max(originalWidth, originalHeight);
            const shortSide = Math.min(originalWidth, originalHeight);
            // Keep aspect ratio and downscale only up to the point where
            // shortSide >= 1080 and longSide >= 1920 are still satisfied.
            const minScaleToKeepBounds = Math.max(minLongSide / longSide, minShortSide / shortSide);
            const scale = Math.min(1, minScaleToKeepBounds);

            if (scale >= 1) {
                if (sourceImage.close) {
                    sourceImage.close();
                }
                return {
                    bytes: new Uint8Array(await file.arrayBuffer()),
                    rotation: rotation
                };
            }

            const targetWidth = Math.max(1, Math.round(originalWidth * scale));
            const targetHeight = Math.max(1, Math.round(originalHeight * scale));
            const canvas = document.createElement('canvas');
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            const ctx = canvas.getContext('2d');
            if (!ctx) {
                if (sourceImage.close) {
                    sourceImage.close();
                }
                throw new Error("failed to get canvas context");
            }
            ctx.drawImage(sourceImage, 0, 0, targetWidth, targetHeight);

            if (sourceImage.close) {
                sourceImage.close();
            }

            const outputType = file.type && file.type.startsWith("image/") ? file.type : "image/jpeg";
            const outputBlob = await new Promise((resolve, reject) => {
                canvas.toBlob((blob) => {
                    if (!blob) {
                        reject(new Error("failed to convert canvas to blob"));
                        return;
                    }
                    resolve(blob);
                }, outputType, 0.92);
            });

            return {
                bytes: new Uint8Array(await outputBlob.arrayBuffer()),
                rotation: 0
            };
        }

        function ImageResize(image_src, mime_type, width, height, rotate) {
            var canvas = document.createElement('canvas');
            if(rotate == 90 || rotate == 270) {
                canvas.width = height;
                canvas.height = width;
            } else {
                canvas.width = width;
                canvas.height = height;
            }
            var ctx = canvas.getContext('2d');
            if(rotate && rotate > 0) {
                ctx.rotate(rotate * Math.PI / 180);
                if(rotate == 90)
                    ctx.translate(0, -height);
                else if(rotate == 180)
                    ctx.translate(-width, -height);
                else if(rotate == 270)
                    ctx.translate(-width, 0);
            }
            ctx.drawImage(image_src, 0, 0, width, height);
            return canvas.toDataURL(mime_type);
        }
    </script>
